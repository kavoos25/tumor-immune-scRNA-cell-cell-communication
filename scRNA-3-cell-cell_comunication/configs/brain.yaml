meta:
  dataset_type: brain
  organism: human
  tissue: brain

random_seed: 0

qc:
  min_genes_per_cell: 500
  max_genes_per_cell: 8000
  max_pct_mt: 8
  min_cells_per_gene: 3

analysis:
  n_top_hvgs: 3000
  n_pcs: 50
  neighbor_k: 20
  leiden_resolution: 0.6

annotation:
  reference_markers:

    Excitatory_neurons: ["SLC17A7","CAMK2A"]
    Inhibitory_neurons: ["GAD1","GAD2"]
    Astrocytes: ["GFAP","AQP4"]
    Oligodendrocytes: ["MBP","MOG","PLP1"]
    OPCs: ["PDGFRA","CSPG4"]
    Microglia: ["CX3CR1","P2RY12","AIF1"]
    Endothelial: ["PECAM1","VWF"]
    Pericytes: ["PDGFRB","RGS5"]

visualization:
  umap_marker_genes:
    - SLC17A7
    - GAD1
    - GFAP
    - MBP
    - PDGFRA
    - CX3CR1
    - PECAM1
