meta:
  dataset_type: lymph_node
  organism: human
  tissue: lymph_node

random_seed: 0

qc:
  min_genes_per_cell: 200
  max_genes_per_cell: 5000
  max_pct_mt: 8
  min_cells_per_gene: 3

analysis:
  n_top_hvgs: 2000
  n_pcs: 40
  neighbor_k: 15
  leiden_resolution: 0.5

annotation:
  reference_markers:

    CD4_T: ["CD3D","CD4"]

    CD8_T: ["CD3D","CD8A"]

    B_cells: ["MS4A1","CD79A"]

    Plasma_cells: ["MZB1","JCHAIN"]

    Dendritic_cells: ["FCER1A"]

    Macrophages: ["CD68"]

visualization:
  umap_marker_genes:
    - CD3D
    - CD4
    - CD8A
    - MS4A1
    - MZB1
    - CD68
