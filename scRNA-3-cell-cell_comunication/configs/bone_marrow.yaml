meta:
  dataset_type: bone_marrow
  organism: human
  tissue: bone_marrow

random_seed: 0

qc:
  min_genes_per_cell: 200
  max_genes_per_cell: 5000
  max_pct_mt: 8
  min_cells_per_gene: 3

analysis:
  n_top_hvgs: 2000
  n_pcs: 40
  neighbor_k: 15
  leiden_resolution: 0.6

annotation:
  reference_markers:

    HSC: ["CD34","KIT"]

    Erythroid: ["HBB","HBA1"]

    Megakaryocytes: ["PPBP","PF4"]

    Monocytes: ["LYZ","S100A8"]

    B_cells: ["MS4A1","CD79A"]

    T_cells: ["CD3D"]

    NK_cells: ["NKG7"]

visualization:
  umap_marker_genes:
    - CD34
    - HBB
    - PPBP
    - MS4A1
    - CD3D
    - NKG7
