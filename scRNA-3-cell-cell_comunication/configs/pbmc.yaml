meta:
  dataset_type: pbmc
  organism: human
  tissue: peripheral_blood

random_seed: 0

multi_resolutions:
  - 0.3
  - 0.5
  - 0.8
  - 1.0

rank_genes_method: wilcoxon
cluster_key: leiden


qc:
  min_genes_per_cell: 200
  max_genes_per_cell: 2500
  max_pct_mt: 5.0
  min_cells_per_gene: 3


analysis:
  n_top_hvgs: 2000
  n_pcs: 40
  neighbor_k: 15
  leiden_resolution: 0.5


annotation:
  reference_markers:

    CD4_T:
      - CD3D
      - CD4
      - IL7R
      - CCR7

    CD8_T:
      - CD3D
      - CD8A
      - GZMB

    NK_cells:
      - NKG7
      - GNLY
      - PRF1

    Naive_B:
      - MS4A1
      - CD79A

    Memory_B:
      - MS4A1
      - CD27

    CD14_Monocytes:
      - LYZ
      - S100A8
      - S100A9

    FCGR3A_Monocytes:
      - FCGR3A
      - MS4A7

    Dendritic_cells:
      - FCER1A
      - CLEC10A

    Platelets:
      - PPBP
      - PF4


visualization:
  umap_marker_genes:
    - CD3D
    - CD4
    - CD8A
    - MS4A1
    - NKG7
    - GNLY
    - LYZ
    - FCGR3A
    - FCER1A
    - PPBP
