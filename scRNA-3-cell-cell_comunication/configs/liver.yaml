meta:
  dataset_type: liver
  organism: human
  tissue: liver

random_seed: 0

qc:
  min_genes_per_cell: 500
  max_genes_per_cell: 8000
  max_pct_mt: 12
  min_cells_per_gene: 3

analysis:
  n_top_hvgs: 3000
  n_pcs: 50
  neighbor_k: 20
  leiden_resolution: 0.6

annotation:
  reference_markers:

    Hepatocytes: ["ALB","TTR","CYP3A4"]
    Cholangiocytes: ["KRT19","SOX9"]
    Hepatic_stellate_cells: ["RGS5","ACTA2","COL1A1"]
    Liver_sinusoidal_endothelial: ["PECAM1","KDR","VWF"]
    Kupffer_cells: ["MARCO","CD163","LYZ"]
    T_cells: ["CD3D"]
    B_cells: ["MS4A1"]
    NK_cells: ["NKG7"]

visualization:
  umap_marker_genes:
    - ALB
    - KRT19
    - COL1A1
    - PECAM1
    - MARCO
    - CD3D
    - MS4A1
