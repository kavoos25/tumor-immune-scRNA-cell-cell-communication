meta:
  dataset_type: heart
  organism: human
  tissue: heart

random_seed: 0

qc:
  min_genes_per_cell: 800
  max_genes_per_cell: 8000
  max_pct_mt: 15
  min_cells_per_gene: 3

analysis:
  n_top_hvgs: 3000
  n_pcs: 50
  neighbor_k: 20
  leiden_resolution: 0.6

annotation:
  reference_markers:

    Cardiomyocytes: ["TNNT2","MYH6","ACTC1"]

    Fibroblasts: ["COL1A1","COL3A1"]

    Endothelial: ["PECAM1","VWF"]

    Smooth_muscle: ["ACTA2","TAGLN"]

    Pericytes: ["PDGFRB","RGS5"]

    Immune: ["PTPRC","LYZ"]

visualization:
  umap_marker_genes:
    - TNNT2
    - MYH6
    - COL1A1
    - PECAM1
    - ACTA2
    - PTPRC
