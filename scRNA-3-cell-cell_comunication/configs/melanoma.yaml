# =========================================
# META INFORMATION
# =========================================

meta:
  dataset_type: tumor_pbmc
  organism: human
  tissue: blood_monocytes


# =========================================
# REPRODUCIBILITY
# =========================================

random_seed: 0

multi_resolutions:
  - 0.3
  - 0.5
  - 0.8
  - 1.0

rank_genes_method: wilcoxon
cluster_key: leiden


# =========================================
# DATA LOADING CONFIGURATION ⭐ NEW
# Controls how n1-2-1 loads the dataset
# =========================================

data:

  # ---------------------------------------
  # Data format type
  # Options:
  #   "10x"   → standard 10x folders
  #   "table" → GEO-style matrix (e.g. GSE72056)
  # ---------------------------------------
  format: "table"

  # ---------------------------------------
  # File name (used only for "table")
  # Must exist in: data/raw/
  # ---------------------------------------
  file: "melanoma_data.txt.gz"

  # ---------------------------------------
  # Options specific to table datasets
  # ---------------------------------------
  table_options:

    # Rows in the table that contain metadata (NOT genes)
    metadata_rows:
      - "Cell"
      - "malignant(1=no,2=yes,0=unresolved)"
      - "non-malignant cell type (1=T,2=B,3=Macro.4=Endo.,5=CAF;6=NK)"

    # Mapping numeric cell labels → biological names
    cell_type_map:
      0: "unknown"
      1: "T_cell"
      2: "B_cell"
      3: "Macrophage"
      4: "Endothelial"
      5: "CAF"
      6: "NK_cell"

    # Index positions of metadata (for flexibility if rows change)
    # 0 → patient/sample id
    # 1 → malignant flag
    # 2 → cell type
    metadata_roles:
      patient_id: 0
      malignant: 1
      cell_type: 2


# =========================================
# QUALITY CONTROL
# =========================================

qc:
  min_genes_per_cell: 500
  max_genes_per_cell: 7000
  max_pct_mt: 15.0
  min_cells_per_gene: 3


# =========================================
# ANALYSIS PARAMETERS
# =========================================

analysis:
  n_top_hvgs: 2000
  n_pcs: 40
  neighbor_k: 15
  leiden_resolution: 0.6


# =========================================
# CELL TYPE ANNOTATION (MARKERS)
# =========================================

annotation:
  reference_markers:

    CD4_T:
      - CD3D
      - CD4
      - IL7R
      - CCR7

    CD8_T:
      - CD3D
      - CD8A
      - GZMB

    NK_cells:
      - NKG7
      - GNLY
      - PRF1

    Naive_B:
      - MS4A1
      - CD79A

    Monocytes_CD14:
      - LYZ
      - S100A8
      - S100A9

    Monocytes_FCGR3A:
      - FCGR3A
      - MS4A7

    Dendritic_cells:
      - FCER1A
      - CLEC10A


# =========================================
# VISUALIZATION
# =========================================

visualization:
  umap_marker_genes:
    - CD3D
    - CD4
    - CD8A
    - MS4A1
    - NKG7
    - GNLY
    - LYZ
    - FCGR3A
    - FCER1A