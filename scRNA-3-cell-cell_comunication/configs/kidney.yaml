meta:
  dataset_type: kidney
  organism: human
  tissue: kidney

random_seed: 0

qc:
  min_genes_per_cell: 500
  max_genes_per_cell: 6000
  max_pct_mt: 12
  min_cells_per_gene: 3

analysis:
  n_top_hvgs: 3000
  n_pcs: 50
  neighbor_k: 20
  leiden_resolution: 0.6

annotation:
  reference_markers:

    Podocytes: ["NPHS1","NPHS2","WT1"]

    Proximal_tubule: ["SLC5A12","LRP2","CUBN"]

    Loop_of_Henle: ["UMOD","SLC12A1"]

    Distal_tubule: ["SLC12A3"]

    Collecting_duct: ["AQP2","FXYD4"]

    Endothelial: ["PECAM1","VWF"]

    Fibroblasts: ["COL1A1","COL3A1"]

    Immune: ["PTPRC","LYZ"]

visualization:
  umap_marker_genes:
    - NPHS1
    - NPHS2
    - LRP2
    - UMOD
    - AQP2
    - PECAM1
    - COL1A1
    - LYZ
