meta:
  dataset_type: pancreas
  organism: human
  tissue: pancreas

random_seed: 0

qc:
  min_genes_per_cell: 500
  max_genes_per_cell: 6000
  max_pct_mt: 10
  min_cells_per_gene: 3

analysis:
  n_top_hvgs: 3000
  n_pcs: 50
  neighbor_k: 20
  leiden_resolution: 0.6

annotation:
  reference_markers:

    Alpha_cells: ["GCG"]

    Beta_cells: ["INS","IAPP"]

    Delta_cells: ["SST"]

    PP_cells: ["PPY"]

    Acinar_cells: ["PRSS1","CPA1"]

    Ductal_cells: ["KRT19","SOX9"]

    Endothelial: ["PECAM1","VWF"]

    Fibroblasts: ["COL1A1"]

    Immune: ["PTPRC","LYZ"]

visualization:
  umap_marker_genes:
    - INS
    - GCG
    - SST
    - PRSS1
    - KRT19
    - PECAM1
    - COL1A1
    - PTPRC
