meta:
  dataset_type: spleen
  organism: human
  tissue: spleen

random_seed: 0

qc:
  min_genes_per_cell: 200
  max_genes_per_cell: 5000
  max_pct_mt: 8
  min_cells_per_gene: 3

analysis:
  n_top_hvgs: 2000
  n_pcs: 40
  neighbor_k: 15
  leiden_resolution: 0.5

annotation:
  reference_markers:

    T_cells: ["CD3D","CD3E"]

    B_cells: ["MS4A1"]

    NK_cells: ["NKG7"]

    Macrophages: ["CD68","CD163"]

    Dendritic_cells: ["FCER1A"]

visualization:
  umap_marker_genes:
    - CD3D
    - MS4A1
    - NKG7
    - CD68
    - FCER1A
